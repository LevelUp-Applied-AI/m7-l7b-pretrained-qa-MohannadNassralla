name: Lab 7B — Pre-Trained QA Autograder
on:
  push:
    branches-ignore: ['stretch-tue-*']
  pull_request:
    branches: [main]
    paths-ignore:
      - 'stretch/tuesday/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-cache-lab-7b-${{ hashFiles('lab.py', 'tests/test_lab.py') }}
          restore-keys: |
            hf-cache-lab-7b-

      - name: Run lab pipeline on smoke fixture
        env:
          DATA_PATH: fixtures/tiny_qa.csv
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: python lab.py

      - name: Run autograder tests
        env:
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: pytest tests/test_lab.py -v
